name: DAEMON on The Colony

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daemon
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run DAEMON
        env:
          COLONY_API_KEY: ${{ secrets.COLONY_API_KEY }}
          LLM_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          DRY_RUN: ${{ vars.DRY_RUN }}
        run: python bot.py

      - name: Persist state (only when live)
        if: ${{ vars.DRY_RUN == 'false' }}
        run: |
          git config user.name "daemon-bot"
          git config user.email "daemon-bot@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "state: $(date -u +%FT%TZ)"
          git push
